name: Build release

on:
  workflow_dispatch:
  pull_request:
  release:
    types: [created]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: rkbx_link_win
            executable_path: target/release/rkbx_link.exe
            offsets_path: data/offsets
            asset_name: rkbx_link_win.zip
          - os: macos-latest
            artifact_name: rkbx_link_macos
            executable_path: target/release/rkbx_link
            offsets_path: data/offsets-macos
            asset_name: rkbx_link_mac.tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p dist
          mkdir -p dist/data
          cp LICENSE dist/
          cp README.md dist/
          cp config dist/
          cp ${{ matrix.executable_path }} dist/
          cp ${{ matrix.offsets_path }} dist/data/



      - name: Upload artifact (preview)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 30

      - name: Create archive (win)
        if: github.event_name == 'release'
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist/* -DestinationPath ${{ matrix.asset_name }}

      - name: Create archive (mac)
        if: github.event_name == 'release'
        if: matrix.os == 'macos-latest'
        run: tar -czf ${{ matrix.asset_name }} dist/

      - name: Upload release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
